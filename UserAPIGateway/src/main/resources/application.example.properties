spring.application.name=user-api-gateway
server.port=8765

# Reactive mode
spring.main.web-application-type=reactive

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.datasource.url=jdbc:postgresql://localhost:5432/shivam
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Production-safe Eureka and client settings
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
eureka.client.healthcheck.enabled=true
eureka.client.registry-fetch-interval-seconds=5
eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.client.instance-info-replication-interval-seconds=10

spring.cloud.loadbalancer.retry.enabled=true
spring.cloud.loadbalancer.ribbon.enabled=false
spring.cloud.loadbalancer.health-check.enabled=true
spring.cloud.loadbalancer.health-check.path.default=/actuator/health
spring.cloud.loadbalancer.connection-timeout=2000
spring.cloud.loadbalancer.read-timeout=3000

resilience4j.retry.instances.default.max-attempts=3
resilience4j.retry.instances.default.wait-duration=500ms
resilience4j.retry.instances.gateway.max-attempts=3
resilience4j.retry.instances.gateway.wait-duration=500ms
resilience4j.timelimiter.instances.default.timeout-duration=3s
resilience4j.timelimiter.instances.gateway.timeout-duration=3s

jwt.secret=YOUR_BASE64_ENCODED_JWT_SECRET

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
app.kafka.topic.user-created=user-created-notifications
app.outbox.publisher.fixed-delay-ms=5000
app.outbox.publisher.max-attempts=10
