spring.application.name=NotificationService

spring.datasource.url=jdbc:postgresql://localhost:5432/notificationdb
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=YOUR_BASE64_ENCODED_JWT_SECRET

# Kafka consumer group used by NotificationService instances that consume published quiz events.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Topics published by MicroserviceQuizService.
app.kafka.topic.quiz-created=quiz-created-notifications
app.kafka.topic.quiz-submitted=quiz-submitted-notifications
app.kafka.topic.user-created=user-created-notifications
