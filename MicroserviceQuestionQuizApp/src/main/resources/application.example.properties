spring.application.name=MicroserviceQuestionQuizApp
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/questiondb
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.instance.hostname=localhost
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Production-safe Eureka and client settings
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
eureka.client.healthcheck.enabled=true
eureka.client.registry-fetch-interval-seconds=5
eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.client.instance-info-replication-interval-seconds=10

spring.cloud.loadbalancer.retry.enabled=true
spring.cloud.loadbalancer.ribbon.enabled=false
spring.cloud.loadbalancer.health-check.enabled=true
spring.cloud.loadbalancer.health-check.path.default=/actuator/health
spring.cloud.loadbalancer.connection-timeout=2000
spring.cloud.loadbalancer.read-timeout=3000
